          path: output
      - name: make tests
        run: |
          cd tests/makai
          mingw32-make release gmake=mingw32-make os=win
          cd ../..
      - uses: actions/upload-artifact@master
        with:
          name: tests-api-release
          path: tests/makai/output/release
