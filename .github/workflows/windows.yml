name: Windows CI

# ...at least it's working.
# I do not want to mess with this EVER AGAIN.

on:
  schedule:
    - cron: "30 9 * * 1"
  #  push:
  #    branches: [ "!legacy-system" ]
  workflow_dispatch:
  workflow_call:
#  pull_request:
#    types: [ "closed" ]
#    branches: [ "main" ]

jobs:
  prepare:
    name: Install Latest GCC Via MSYS2
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/cache@v4
        id: cache
        with: |
          cache/msys2
          ${{env.msys2}}
        key: windows-msys2
      - name: Install MSYS2
        if: steps.cache.outputs.cache-hit != 'true'
        uses: msys2/setup-msys2@v2
        id: prep
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: git mingw-w64-x86_64-toolchain mingw-w64-x86_64-7zip
      - name: Verify GCC Installation
        run: |
          gcc --version
          g++ --version
          mingw32-make --version
      - name: Memorize environment
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          msys2: ${{ steps.prep.outputs.msys2-location }}
        run: echo "$env:msys2" > cache/msys2

  ship-it-full:
    name: Ship the library (FULL ver.)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          key: windows-msys2
      - name: make ship-it
        run: |
          mingw32-make ship-it gmake=mingw32-make os=win compiler=msys2-gcc
      - uses: actions/upload-artifact@master
        with:
          name: windows-builds
          path: output/win-*.zip

  build-ctl-tests-debug:
    name: Build CTL Tests (DEBUG)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          key: windows-msys2
      - name: make tests
        run: |
          cd tests/ctl
          mingw32-make debug gmake=mingw32-make os=win
          cd ../..
      - uses: actions/upload-artifact@master
        with:
          name: tests-ctl-debug
          path: tests/ctl/output/debug

