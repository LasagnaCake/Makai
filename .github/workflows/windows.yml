  build-core-lib-debug:
    name: Build Makai (DEBUG)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          key: windows-msys2
      - name: make debug gmake=mingw32-make
        run: |
          mingw32-make link-extern gmake=mingw32-make os=win
          mingw32-make debug gmake=mingw32-make os=win
      - uses: actions/upload-artifact@master
        with:
          name: lib-debug
          path: output

  build-core-lib-release:
    name: Build Makai (RELEASE)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          key: windows-msys2
      - name: make release
        run: |
          mingw32-make link-extern gmake=mingw32-make os=win
          mingw32-make release gmake=mingw32-make os=win
      - uses: actions/upload-artifact@master
        with:
          name: lib-release
          path: output

  build-tooling:
    name: Build Tooling
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    needs: [build-core-lib-debug, build-core-lib-release]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          key: windows-msys2
      - uses: actions/download-artifact@master
        with:
          name: lib-debug
          path: output
      - uses: actions/download-artifact@master
        with:
          name: lib-release
          path: output
      - name: make tooling
        run: |
          mingw32-make tooling gmake=mingw32-make os=win
      - uses: actions/upload-artifact@master
        with:
          name: tooling
          path: output/bin

  build-lib-tests-debug:
    name: Build API Tests (DEBUG)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    needs: [build-core-lib-debug]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          key: windows-msys2
      - uses: actions/download-artifact@master
        with:
          name: lib-debug
          path: output
      - name: make tests
        run: |
          cd tests/makai
          mingw32-make debug gmake=mingw32-make os=win
          cd ../..
      - uses: actions/upload-artifact@master
        with:
          name: tests-api-debug
          path: tests/makai/output/debug

  build-lib-tests-release:
    name: Build API Tests (RELEASE)
    runs-on: windows-latest
    defaults:
