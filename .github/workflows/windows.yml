name: Windows CI

# ...at least it's working.
# I do not want to mess with this EVER AGAIN.

on:
  schedule:
    - cron: "30 9 * * 1"
  #  push:
  #    branches: [ "!legacy-system" ]
  workflow_dispatch:
  workflow_call:
#  pull_request:
#    types: [ "closed" ]
#    branches: [ "main" ]

jobs:
  prepare:
    name: Install Latest GCC Via MSYS2
    runs-on: windows-latest
    defaults: &msys2
      run:
        shell: msys2 {0}
    steps:
      - uses: ./.github/actions/setup/msys2
      - name: Verify GCC Installation
        run: |
          gcc --version
          g++ --version
          mingw32-make --version

  ship-it-full:
    name: Ship the library (FULL ver.)
    runs-on: windows-latest
    defaults: *msys2
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - name: make ship-it
        run: |
          make ship-it os=win compiler=msys2-gcc
      - uses: actions/upload-artifact@master
        with:
          name: windows-builds
          path: output/win-*.zip

  build-ctl-tests-debug:
    name: Build CTL Tests (DEBUG)
    runs-on: windows-latest
    defaults: *msys2
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - name: make tests
        run: |
          cd tests/ctl
          make debug os=win
          cd ../..
      - uses: actions/upload-artifact@master
        with:
          name: tests-ctl-debug
          path: tests/ctl/output/debug

  # run-ctl-tests-debug:
  #   name: Run CTL Tests (DEBUG)
  #   runs-on: windows-latest
  #   needs: [build-ctl-tests-debug]
  #   steps:
  #     - uses: actions/download-artifact@master
  #       with:
  #         name: tests-ctl-debug
  #         path: tests
  #     - name: run tests
  #       run: |
  #         cd tests
  #         for /r "." %%a in (*.debug.exe) do start "" "%%~fa"
  #         cd ..

  build-ctl-tests-release:
    name: Build CTL Tests (RELEASE)
    runs-on: windows-latest
    defaults: *msys2
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - name: make tests
        run: |
          cd tests/ctl
          make release os=win
          cd ../..
      - uses: actions/upload-artifact@master
        with:
          name: tests-ctl-release
          path: tests/ctl/output/release

  # run-ctl-tests-release:
  #   name: Run CTL Tests (RELEASE)
  #   runs-on: windows-latest
  #   needs: [build-ctl-tests-release]
  #   steps:
  #     - uses: actions/download-artifact@master
  #       with:
  #         name: tests-ctl-release
  #         path: tests
  #     - name: run tests
  #       run: |
  #         cd tests
  #         for /r "." %%a in (*.release.exe) do start "" "%%~fa"
  #         cd ..

  build-core-lib-debug:
    name: Build Makai (DEBUG)
    runs-on: windows-latest
    defaults: *msys2
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - name: make debug gmake=mingw32-make
        run: |
          make link-extern os=win
          make debug os=win
      - uses: actions/upload-artifact@master
        with:
          name: lib-debug
          path: output

  build-core-lib-release:
    name: Build Makai (RELEASE)
    runs-on: windows-latest
    defaults: *msys2
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - name: make release
        run: |
          make link-extern os=win
          make release os=win
      - uses: actions/upload-artifact@master
        with:
          name: lib-release
          path: output

  build-tooling:
    name: Build Tooling
    runs-on: windows-latest
    defaults: *msys2
    needs: [build-core-lib-debug, build-core-lib-release]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - uses: actions/download-artifact@master
        with:
          name: lib-debug
          path: output
      - uses: actions/download-artifact@master
        with:
          name: lib-release
          path: output
      - name: make tooling
        run: |
          make tooling make os=win
      - uses: actions/upload-artifact@master
        with:
          name: tooling
          path: output/bin

  build-lib-tests-debug:
    name: Build API Tests (DEBUG)
    runs-on: windows-latest
    defaults: *msys2
    needs: [build-core-lib-debug]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - uses: actions/download-artifact@master
        with:
          name: lib-debug
          path: output
      - name: make tests
        run: |
          cd tests/makai
          mingw32-make debug gmake=mingw32-make os=win
          cd ../..
      - uses: actions/upload-artifact@master
        with:
          name: tests-api-debug
          path: tests/makai/output/debug

  build-lib-tests-release:
    name: Build API Tests (RELEASE)
    runs-on: windows-latest
    defaults: *msys2
    needs: [build-core-lib-release]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup/msys2
      - uses: actions/download-artifact@master
        with:
          name: lib-release
          path: output
      - name: make tests
        run: |
          cd tests/makai
          make release os=win
          cd ../..
      - uses: actions/upload-artifact@master
        with:
          name: tests-api-release
          path: tests/makai/output/release
