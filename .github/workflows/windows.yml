  build-ctl-tests-release:
    name: Build CTL Tests (RELEASE)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          key: windows-msys2
      - name: make tests
        run: |
          cd tests/ctl
