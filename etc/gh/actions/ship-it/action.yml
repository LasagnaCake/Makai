name: Ship library
inputs:
  type:
    description: "Build type"
    required: false
    default: lite
runs:
  using: composite
  steps:
    - name: Get environment info
      with: LasagnaCake/Makai/etc/gh/actions/meta/info@main
      id: info
    - name: Prepare environment
    - uses: LasagnaCake/Makai/etc/gh/actions/setup/${{steps.info.output.env}}@main
    - uses: actions/checkout@v4
    - name: Build library
      run: make ship-it os=${{inputs.os}} lite=${{case(inputs.type == 'lite', '1', '0')}} skip-tooling=${{case(inputs.type == 'lite', '1', '0')}}
      shell: ${{steps.info.output.shell}}
    - name: Upload artifact
      uses: actions/upload-artifact@master
      with:
        name: lib-${{steps.info.output.os}}-${{inputs.type}}
        path: output/${{inputs.os}}-*.zip
