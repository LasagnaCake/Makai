name: Ship library
inputs:
  type:
    description: "Build type"
    required: false
    default: lite
  ship-it-linux:
    if: runner.os == Linux
    shell: msys2 {0}
    steps:
      - name: Prepare environment
      - uses: LasagnaCake/Makai/etc/gh/actions/setup/linux@main
      - uses: actions/checkout@v4
      - name: make ship-it
        run: make ship-it os=linux lite=${{case(inputs.type == 'lite', '1', '0')}} skip-tooling=${{case(inputs.type == 'lite', '1', '0')}}
      - uses: actions/upload-artifact@master
        with:
          name: lib-linux-${{inputs.type}}
          path: output/linux-*.zip
  ship-it-windows:
    if: runner.os == Windows
    shell: msys2 {0}
    steps:
      - name: Prepare environment
      - uses: LasagnaCake/Makai/etc/gh/actions/setup/msys2@main
      - uses: actions/checkout@v4
      - name: make ship-it
        run: make ship-it os=win lite=${{case(inputs.type == 'lite', '1', '0')}} skip-tooling=${{case(inputs.type == 'lite', '1', '0')}}
      - uses: actions/upload-artifact@master
        with:
          name: lib-win-${{inputs.type}}
          path: output/win-*.zip
