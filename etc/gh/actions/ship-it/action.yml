name: Ship library
inputs:
  type:
    description: "Build type"
    required: false
    default: lite
runs:
  using: composite
  steps:
    - name: Get environment info
      uses: LasagnaCake/Makai/etc/gh/actions/meta/info@main
      with:
        type: ${{inputs.type}}
      id: info
    - name: Prepare environment
    - uses: LasagnaCake/Makai/etc/gh/actions/setup/${{steps.info.output.env}}@main
    - uses: actions/checkout@v4
    - name: Build library
      run: make ship-it os=${{inputs.os}} lite=${{steps.info.output.lite}} skip-tooling=${{steps.info.output.lite}}
      shell: ${{steps.info.output.shell}}
    - name: Upload artifact
      uses: actions/upload-artifact@master
      with:
        name: lib-${{steps.info.output.os}}-${{inputs.type}}
        path: output/${{inputs.os}}-*.zip
