name: Ship library
inputs:
  type:
    description: "Build type"
    required: false
    default: lite
runs:
  using: composite
  env:
    os: ${{case(runner.os == 'Windows', 'win', 'linux')}}
    env: ${{case(runner.os == 'Windows', 'msys2', 'linux')}}
    shell: ${{case(runner.os == 'Windows', 'msys2 {0}', 'bash')}}
    lite: ${{case(inputs.type == 'lite', '1', '0')}}
  steps:
    - name: Ship the library (${{inputs.type}} ver. -> ${{runner.os}})
      shell: ${{env.shell}}
      steps:
        - name: Prepare environment
        - uses: LasagnaCake/Makai/etc/gh/actions/setup/${{env.env}}@main
        - uses: actions/checkout@v4
        - name: make ship-it
          run: make ship-it os=${{env.os}} lite=${{env.lite}} skip-tooling=${{env.lite}}
        - uses: actions/upload-artifact@master
          with:
            name: lib-${{env.os}}-${{inputs.type}}
            path: output/${{env.os}}-*.zip
