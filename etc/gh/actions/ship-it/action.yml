name: Ship library
inputs:
  type:
    description: "Build type"
    required: false
    default: lite
  os:
    description: "Target OS"
    required: true
  env:
    os: ${{case(inputs.os == 'Windows', 'win', 'linux')}};
    env: ${{case(inputs.os == 'Windows', 'msys2', 'linux')}};
    shell: ${{case(inputs.os == 'Windows', 'msys2 {0}', 'bash')}}
  ship-it:
    shell: ${{env.shell}}
    steps:
      - name: Prepare environment
      - uses: LasagnaCake/Makai/etc/gh/actions/setup/${{env.env}}@main
      - uses: actions/checkout@v4
      - name: make ship-it
        run: make ship-it os=${{env.os}} lite=${{case(inputs.type == 'lite', '1', '0')}}
      - uses: actions/upload-artifact@master
        with:
          name: lib-${{env.os}}-${{inputs.type}}
          path: output/${{env.os}}-*.zip
