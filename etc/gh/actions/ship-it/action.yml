name: Ship library
inputs:
  type:
    description: "Build type"
    required: false
    default: lite
runs:
  using: composite
  steps:
    - name: Get environment info
      id: info
      uses: LasagnaCake/Makai/etc/gh/actions/info@main
      with:
        type: ${{inputs.type}}
    - name: View environment info
      run: |
        echo "today: [${{steps.info.output.today}}]"
        echo "os: [${{steps.info.output.os}}]"
        echo "env: [${{steps.info.output.env}}]"
        echo "shell: [${{steps.info.output.shell}}]"
        echo "lite? [${{steps.info.output.lite}}]"
      shell: bash
    - name: Prepare environment
      if: runner.os == 'Windows'
      uses: LasagnaCake/Makai/etc/gh/actions/setup/msys2@main
    - name: Prepare environment
      if: runner.os == 'Linux'
      uses: LasagnaCake/Makai/etc/gh/actions/setup/linux@main
    - uses: actions/checkout@v4
    - name: Build library
      run: make ship-it os="${{steps.info.output.os}}" lite="${{steps.info.output.lite}}" skip-tooling="${{steps.info.output.lite}}"
      shell: ${{steps.info.output.shell}}
    - name: Upload artifact
      uses: actions/upload-artifact@master
      with:
        name: lib-${{steps.info.output.os}}-${{inputs.type}}
        path: output/${{inputs.os}}-*.zip
